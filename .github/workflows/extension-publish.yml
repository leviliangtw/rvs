name: Publish Extension

# Publishes to the Chrome Web Store, but ONLY when the version in
# extension/manifest.json is bumped on main (i.e. after a PR is merged).
on:
  push:
    branches: [main]
    paths:
      - 'extension/**'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need HEAD^ to diff the manifest version

      - name: Check if manifest version was bumped
        id: version
        run: |
          CUR=$(jq -r .version extension/manifest.json)
          PREV=$(git show HEAD^:extension/manifest.json 2>/dev/null | jq -r .version || echo "")
          echo "current=$CUR previous=$PREV"
          if [ -z "$PREV" ] || [ "$PREV" = "null" ]; then
            echo "No previous manifest — treating as a new version."
            BUMPED=true
          elif [ "$CUR" = "$PREV" ]; then
            BUMPED=false
          elif [ "$(printf '%s\n%s\n' "$PREV" "$CUR" | sort -V | tail -1)" = "$CUR" ]; then
            BUMPED=true # CUR is strictly greater than PREV
          else
            echo "::warning::Version changed but is not greater ($PREV -> $CUR); skipping publish."
            BUMPED=false
          fi
          echo "bumped=$BUMPED" >> "$GITHUB_OUTPUT"
          echo "version=$CUR" >> "$GITHUB_OUTPUT"

      - name: Package extension
        if: steps.version.outputs.bumped == 'true'
        run: |
          cd extension
          zip -r ../extension.zip . -x '*.DS_Store'

      - name: Upload & publish to Chrome Web Store
        if: steps.version.outputs.bumped == 'true'
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true

      - name: Summary
        run: |
          if [ "${{ steps.version.outputs.bumped }}" = "true" ]; then
            echo "Published version ${{ steps.version.outputs.version }} to the Chrome Web Store." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No version bump detected — nothing published." >> "$GITHUB_STEP_SUMMARY"
          fi
