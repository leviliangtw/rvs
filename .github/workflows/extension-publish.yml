name: Publish Extension

# Publishes to the Chrome Web Store, but ONLY when the version in
# extension/manifest.json is bumped on main (i.e. after a PR is merged).
# On a successful publish it also tags the commit and creates a GitHub Release.
on:
  push:
    branches: [main]
    paths:
      - 'extension/**'

permissions:
  contents: write # needs write so the workflow can push a tag and create a Release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so we can find the previous manifest commit

      - name: Check if manifest version was bumped
        id: version
        run: |
          CUR=$(jq -r .version extension/manifest.json)
          # Compare the current manifest version against the previous commit on
          # main (HEAD^ — the state before this push/merge landed), the same way
          # the test workflow compares against the PR base branch. The trigger
          # fires on any extension/** change, so a push that edits e.g. content.js
          # without bumping the version must NOT republish.
          PREV=$(git show HEAD^:extension/manifest.json 2>/dev/null | jq -r .version || echo "")
          echo "current=$CUR previous=$PREV"
          if [ -z "$PREV" ] || [ "$PREV" = "null" ]; then
            echo "No previous manifest — treating as a new version."
            BUMPED=true
          elif [ "$CUR" = "$PREV" ]; then
            BUMPED=false
          elif [ "$(printf '%s\n%s\n' "$PREV" "$CUR" | sort -V | tail -1)" = "$CUR" ]; then
            BUMPED=true # sort -V confirms CUR is strictly greater than PREV
          else
            echo "::warning::Version changed but is not greater ($PREV -> $CUR); skipping publish."
            BUMPED=false
          fi
          echo "bumped=$BUMPED" >> "$GITHUB_OUTPUT"
          echo "version=$CUR" >> "$GITHUB_OUTPUT"

      - name: Package extension
        if: steps.version.outputs.bumped == 'true'
        run: |
          cd extension
          zip -r ../extension.zip . -x '*.DS_Store'

      - name: Upload & publish to Chrome Web Store
        if: steps.version.outputs.bumped == 'true'
        uses: mnao305/chrome-extension-upload@fdfe79400af990f5145a319e834aee64907ccff4 # v6.0.0
        with:
          file-path: extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true

      # Runs only after a successful publish (a failed step above fails the job
      # and stops here). Tags the commit and attaches the packaged zip.
      - name: Create GitHub Release
        if: steps.version.outputs.bumped == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }} # e.g. v1.0.1
          name: Release v${{ steps.version.outputs.version }}
          files: extension.zip # also back up the packaged zip on the Release
          generate_release_notes: true # auto-generate the changelog

      - name: Summary
        if: always()
        env:
          BUMPED: ${{ steps.version.outputs.bumped }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ "$BUMPED" = "true" ]; then
            MSG="Published version $VERSION to the Chrome Web Store and created Release v$VERSION."
          else
            MSG="No version bump detected — nothing published."
          fi
          echo "::notice::$MSG"           # visible in the run log + as an annotation
          echo "$MSG" >> "$GITHUB_STEP_SUMMARY"  # markdown on the run summary page

